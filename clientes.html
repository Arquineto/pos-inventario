<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes - POS Terminal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header"><h1>POS_TERMINAL<span class="terminal-cursor"></span></h1><small>Clientes</small></div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item"><i class="fas fa-chart-line"></i><span>Dashboard</span></a>
                <a href="ventas.html" class="nav-item"><i class="fas fa-cash-register"></i><span>Punto de Venta</span></a>
                <a href="inventario.html" class="nav-item"><i class="fas fa-boxes"></i><span>Inventario</span></a>
                <a href="clientes.html" class="nav-item active"><i class="fas fa-users"></i><span>Clientes</span></a>
                <a href="reportes.html" class="nav-item"><i class="fas fa-chart-line"></i><span>Reportes</span></a>
                <a href="ventas-dia.html" class="nav-item"><i class="fas fa-chart-simple"></i><span>IPV del Día</span></a>
                <a href="cierre-caja.html" class="nav-item"><i class="fas fa-calculator"></i><span>Cierre de Caja</span></a>
                <a href="reporte-iva.html" class="nav-item"><i class="fas fa-file-invoice-dollar"></i><span>Reporte IVA</span></a>
                <a href="configuracion.html" class="nav-item"><i class="fas fa-cog"></i><span>Configuración</span></a>
            </nav>
            <div class="sidebar-footer">
                <div class="theme-toggle" id="themeToggle"><span><i class="fas fa-moon"></i> Modo oscuro</span><span id="themeStatus">🌙</span></div>
                <div class="color-options"><div class="color-dot" data-color="default" style="background:#2563eb"></div><div class="color-dot" data-color="emerald" style="background:#10b981"></div><div class="color-dot" data-color="violet" style="background:#8b5cf6"></div><div class="color-dot" data-color="rose" style="background:#f43f5e"></div><div class="color-dot" data-color="amber" style="background:#f59e0b"></div></div>
            </div>
        </aside>
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <main class="main-content">
            <div class="mobile-header"><button class="mobile-menu-btn" id="mobileMenuBtn"><i class="fas fa-bars"></i></button><h2><i class="fas fa-users"></i> Clientes</h2><div></div></div>

            <div class="terminal-card">
                <h2><i class="fas fa-user-plus"></i> Nuevo Cliente</h2>
                <button id="btnAgregarCliente" class="btn-terminal btn-terminal-primary">+ Agregar</button>
                <div id="formCliente" class="hidden" style="margin-top:16px;">
                    <input type="text" id="cliNombre" class="terminal-input" placeholder="Nombre *" style="margin-bottom:12px;">
                    <input type="text" id="cliTelefono" class="terminal-input" placeholder="Teléfono" style="margin-bottom:12px;">
                    <div style="display:flex; gap:12px;"><button id="btnGuardarCliente" class="btn-terminal btn-terminal-primary">Guardar</button><button id="btnCancelarCliente" class="btn-terminal">Cancelar</button></div>
                </div>
            </div>

            <div class="terminal-card">
                <h2><i class="fas fa-list"></i> Directorio</h2>
                <input type="text" id="buscarCliente" class="terminal-input" placeholder="🔍 Buscar...">
                <div class="deuda-total" style="background:var(--bg-tertiary); padding:16px; border-radius:12px; margin:16px 0; text-align:center;"><h3>💰 Total deudas</h3><p id="totalDeudas" style="font-size:1.8rem; font-weight:bold; color:var(--danger);">$0</p></div>
                <div id="listaClientes" class="products-grid"></div>
            </div>

            <div class="terminal-card">
                <h2><i class="fas fa-history"></i> Historial de compras</h2>
                <div id="historialCompras" style="max-height:300px; overflow-y:auto;"></div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
    <script src="storage-manager.js"></script>
    <script>
        let clientes = [];
        let ventas = [];

        async function cargarClientes() {
            clientes = await storage.getData('clientes');
            ventas = await storage.getData('ventas');
            const busqueda = document.getElementById('buscarCliente').value.toLowerCase();
            const filtrados = clientes.filter(c => c.nombre.toLowerCase().includes(busqueda) || (c.telefono && c.telefono.includes(busqueda)));
            const totalDeudas = clientes.reduce((s,c)=>s+(c.deuda||0),0);
            document.getElementById('totalDeudas').textContent = `$${totalDeudas.toFixed(2)}`;
            const lista = document.getElementById('listaClientes');
            if(!filtrados.length){ lista.innerHTML='<div class="empty-state">👤 No hay clientes</div>'; return; }
            lista.innerHTML = filtrados.map(c => `<div class="product-card-grid ${c.deuda>0?'stock-low':''}">
                ${c.deuda>0?'<div class="stock-badge">💸 Deuda</div>':''}
                <div class="product-icon"><i class="fas fa-user-circle"></i></div>
                <div class="product-name">${c.nombre}</div>
                <div class="product-price" style="color:${c.deuda>0?'var(--danger)':'var(--success)'};">${c.deuda>0?`Deuda: $${c.deuda.toFixed(2)}`:'✓ Sin deudas'}</div>
                <div class="product-stock">📞 ${c.telefono||'Sin teléfono'}</div>
                <div style="display:flex; gap:8px; margin-top:12px;">
                    ${c.deuda>0?`<button class="btn-pagar" data-id="${c.id}" style="flex:1; background:var(--success); border:none; padding:6px; border-radius:6px;"><i class="fas fa-money-bill-wave"></i> Pagar</button>`:''}
                    <button class="btn-edit-client" data-id="${c.id}" style="flex:1; background:var(--bg-tertiary); border:none; padding:6px; border-radius:6px;"><i class="fas fa-edit"></i> Editar</button>
                    <button class="btn-delete-client" data-id="${c.id}" style="flex:1; background:var(--danger); border:none; padding:6px; border-radius:6px;"><i class="fas fa-trash"></i></button>
                </div>
            </div>`).join('');
            document.querySelectorAll('.btn-pagar').forEach(btn=>btn.addEventListener('click',()=>pagarDeuda(btn.dataset.id)));
            document.querySelectorAll('.btn-edit-client').forEach(btn=>btn.addEventListener('click',()=>editarCliente(btn.dataset.id)));
            document.querySelectorAll('.btn-delete-client').forEach(btn=>btn.addEventListener('click',()=>eliminarCliente(btn.dataset.id)));
        }

        async function pagarDeuda(id){
            const monto = prompt('💰 ¿Monto a pagar?');
            if(monto && !isNaN(parseFloat(monto))){
                let clientesList = await storage.getData('clientes');
                const idx = clientesList.findIndex(c=>c.id===id);
                if(idx!==-1){
                    const pago = parseFloat(monto);
                    const nuevaDeuda = (clientesList[idx].deuda||0) - pago;
                    clientesList[idx].deuda = nuevaDeuda < 0 ? 0 : nuevaDeuda;
                    let pagos = await storage.getData('pagos')||[];
                    pagos.push({id:Date.now().toString(),clienteId:id,clienteNombre:clientesList[idx].nombre,monto:pago,fecha:new Date().toISOString()});
                    await storage.saveData('clientes',clientesList);
                    await storage.saveData('pagos',pagos);
                    alert(`✅ Pago registrado. Deuda restante: $${clientesList[idx].deuda.toFixed(2)}`);
                    cargarClientes();
                }
            }
        }

        function editarCliente(id){
            const c = clientes.find(c=>c.id===id);
            if(c){
                document.getElementById('cliNombre').value=c.nombre;
                document.getElementById('cliTelefono').value=c.telefono||'';
                document.getElementById('formCliente').classList.remove('hidden');
                document.getElementById('btnAgregarCliente').style.display='none';
                window.editandoClienteId=id;
            }
        }

        async function eliminarCliente(id){
            if(confirm('¿Eliminar cliente?')){
                let clientesList = await storage.getData('clientes');
                clientesList = clientesList.filter(c=>c.id!==id);
                await storage.saveData('clientes',clientesList);
                cargarClientes();
            }
        }

        document.getElementById('btnAgregarCliente').addEventListener('click',()=>{
            window.editandoClienteId=null;
            document.getElementById('cliNombre').value='';
            document.getElementById('cliTelefono').value='';
            document.getElementById('formCliente').classList.remove('hidden');
            document.getElementById('btnAgregarCliente').style.display='none';
        });

        document.getElementById('btnGuardarCliente').addEventListener('click',async()=>{
            const nombre = document.getElementById('cliNombre').value.trim();
            const telefono = document.getElementById('cliTelefono').value.trim();
            if(!nombre){ alert('Nombre requerido'); return; }
            let clientesList = await storage.getData('clientes');
            if(window.editandoClienteId){
                const idx = clientesList.findIndex(c=>c.id===window.editandoClienteId);
                if(idx!==-1) clientesList[idx] = {...clientesList[idx], nombre, telefono};
            } else {
                clientesList.push({id:Date.now().toString(), nombre, telefono, deuda:0, fechaRegistro:new Date().toISOString()});
            }
            await storage.saveData('clientes',clientesList);
            document.getElementById('formCliente').classList.add('hidden');
            document.getElementById('btnAgregarCliente').style.display='block';
            cargarClientes();
        });

        document.getElementById('btnCancelarCliente').addEventListener('click',()=>{
            document.getElementById('formCliente').classList.add('hidden');
            document.getElementById('btnAgregarCliente').style.display='block';
        });

        document.getElementById('buscarCliente').addEventListener('input',cargarClientes);

        // Historial de compras
        async function cargarHistorialCompras(){
            const clienteSeleccionado = document.querySelector('.btn-edit-client:focus')?.dataset.id || clientes[0]?.id;
            if(clienteSeleccionado){
                const comprasCliente = ventas.filter(v=>v.clienteId===clienteSeleccionado);
                const container = document.getElementById('historialCompras');
                if(!comprasCliente.length){ container.innerHTML='<div class="empty-state">No hay compras de este cliente</div>'; return; }
                container.innerHTML = comprasCliente.map(v=>`<div class="cart-item-terminal" style="margin-bottom:8px;"><div style="display:flex; justify-content:space-between;"><strong>Factura #${v.factura}</strong><strong>$${v.total.toFixed(2)}</strong></div><div>${new Date(v.fecha).toLocaleString()}</div><div>${v.items.map(i=>`${i.nombre} x${i.cantidad}`).join(', ')}</div></div>`).join('');
            }
        }

        cargarClientes();
        cargarHistorialCompras();

        // Sidebar, tema, colores (igual)
        const sidebar=document.getElementById('sidebar'), overlay=document.getElementById('sidebarOverlay'), mobileBtn=document.getElementById('mobileMenuBtn');
        mobileBtn?.addEventListener('click',()=>{ sidebar.classList.toggle('open'); overlay.classList.toggle('open'); });
        overlay?.addEventListener('click',()=>{ sidebar.classList.remove('open'); overlay.classList.remove('open'); });
        const themeToggle=document.getElementById('themeToggle'), savedTheme=localStorage.getItem('theme')||'light';
        document.documentElement.setAttribute('data-theme',savedTheme);
        themeToggle.querySelector('#themeStatus').textContent=savedTheme==='dark'?'☀️':'🌙';
        themeToggle.addEventListener('click',()=>{ const curr=document.documentElement.getAttribute('data-theme'); const nue=curr==='dark'?'light':'dark'; document.documentElement.setAttribute('data-theme',nue); localStorage.setItem('theme',nue); themeToggle.querySelector('#themeStatus').textContent=nue==='dark'?'☀️':'🌙'; });
        const colorDots=document.querySelectorAll('.color-dot'), savedColor=localStorage.getItem('colorTheme')||'default';
        document.documentElement.setAttribute('data-color',savedColor);
        colorDots.forEach(dot=>{ dot.classList.toggle('active',dot.dataset.color===savedColor); dot.addEventListener('click',()=>{ const col=dot.dataset.color; document.documentElement.setAttribute('data-color',col); localStorage.setItem('colorTheme',col); colorDots.forEach(d=>d.classList.remove('active')); dot.classList.add('active'); }); });
    </script>
</body>
</html>
