<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Clientes - POS Terminal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar - Panel lateral -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1>POS_TERMINAL<span class="terminal-cursor"></span></h1>
                <small>Gestión de Clientes</small>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item">
                    <i class="fas fa-chart-line"></i>
                    <span>Dashboard</span>
                </a>
                <a href="ventas.html" class="nav-item">
                    <i class="fas fa-cash-register"></i>
                    <span>Punto de Venta</span>
                </a>
                <a href="inventario.html" class="nav-item">
                    <i class="fas fa-boxes"></i>
                    <span>Inventario</span>
                </a>
                <a href="clientes.html" class="nav-item active">
                    <i class="fas fa-users"></i>
                    <span>Clientes</span>
                </a>
                <a href="reportes.html" class="nav-item">
                    <i class="fas fa-chart-line"></i>
                    <span>Reportes</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="theme-controls">
                    <div class="theme-toggle" id="themeToggle">
                        <span><i class="fas fa-moon"></i> Modo oscuro</span>
                        <span id="themeStatus">🌙</span>
                    </div>
                    <div class="color-select">
                        <span><i class="fas fa-palette"></i> Tema</span>
                    </div>
                    <div class="color-options">
                        <div class="color-dot" data-color="default" style="background: #2563eb;"></div>
                        <div class="color-dot" data-color="emerald" style="background: #10b981;"></div>
                        <div class="color-dot" data-color="violet" style="background: #8b5cf6;"></div>
                        <div class="color-dot" data-color="rose" style="background: #f43f5e;"></div>
                        <div class="color-dot" data-color="amber" style="background: #f59e0b;"></div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Overlay para móvil -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header móvil -->
            <div class="mobile-header">
                <button class="mobile-menu-btn" id="mobileMenuBtn">
                    <i class="fas fa-bars"></i>
                </button>
                <h2><i class="fas fa-users"></i> Clientes</h2>
                <div></div>
            </div>

            <!-- Tarjeta: Agregar nuevo cliente -->
            <div class="terminal-card">
                <h2><i class="fas fa-user-plus"></i> Nuevo cliente</h2>
                <button id="btnAgregarCliente" class="btn-terminal btn-terminal-primary" style="margin-bottom: 16px;">
                    <i class="fas fa-plus"></i> Agregar cliente
                </button>

                <div id="formCliente" class="hidden" style="margin-top: 16px;">
                    <input type="text" id="cliNombre" class="terminal-input" placeholder="Nombre completo" style="margin-bottom: 12px;">
                    <input type="text" id="cliTelefono" class="terminal-input" placeholder="Teléfono" style="margin-bottom: 12px;">
                    <input type="email" id="cliEmail" class="terminal-input" placeholder="Email (opcional)" style="margin-bottom: 12px;">
                    <div style="display: flex; gap: 12px;">
                        <button id="btnGuardarCliente" class="btn-terminal btn-terminal-primary">Guardar</button>
                        <button id="btnCancelarCliente" class="btn-terminal">Cancelar</button>
                    </div>
                </div>
            </div>

            <!-- Tarjeta: Lista de clientes y deudas -->
            <div class="terminal-card">
                <h2><i class="fas fa-list"></i> Directorio de clientes</h2>
                
                <!-- Buscador -->
                <div class="search-box" style="margin-bottom: 20px;">
                    <input type="text" id="buscarCliente" class="terminal-input" placeholder="🔍 Buscar por nombre o teléfono...">
                </div>

                <!-- Resumen de deudas totales -->
                <div class="deuda-total" style="background: var(--bg-tertiary); padding: 16px; border-radius: 12px; margin-bottom: 20px; text-align: center;">
                    <i class="fas fa-credit-card" style="font-size: 1.5rem; color: var(--warning);"></i>
                    <h3 style="margin-top: 8px;">💰 Total deudas pendientes</h3>
                    <p style="font-size: 1.8rem; font-weight: bold; color: var(--danger);" id="totalDeudas">$0</p>
                </div>

                <!-- Lista de clientes en formato grid -->
                <div id="listaClientes" class="products-grid">
                    <!-- Clientes cargados dinámicamente -->
                </div>
            </div>

            <!-- Tarjeta: Historial de pagos recientes -->
            <div class="terminal-card">
                <h2><i class="fas fa-history"></i> Últimos pagos</h2>
                <div id="historialPagos" class="pagos-list" style="max-height: 300px; overflow-y: auto;">
                    <!-- Pagos cargados dinámicamente -->
                </div>
            </div>
        </main>
    </div>

    <script>
        // ==================== FUNCIONES PRINCIPALES ====================
        
        function cargarClientes() {
            const clientes = JSON.parse(localStorage.getItem('clientes') || '[]');
            const busqueda = document.getElementById('buscarCliente').value.toLowerCase();
            
            const filtrados = clientes.filter(c => 
                c.nombre.toLowerCase().includes(busqueda) || 
                (c.telefono && c.telefono.includes(busqueda))
            );
            
            // Actualizar total de deudas
            const totalDeudas = clientes.reduce((sum, c) => sum + (c.deuda || 0), 0);
            document.getElementById('totalDeudas').textContent = `$${totalDeudas.toFixed(2)}`;
            
            const lista = document.getElementById('listaClientes');
            if (filtrados.length === 0) {
                lista.innerHTML = '<div class="empty-state"><i class="fas fa-user-slash"></i> No hay clientes registrados</div>';
                return;
            }
            
            lista.innerHTML = filtrados.map(c => {
                const tieneDeuda = (c.deuda || 0) > 0;
                return `
                    <div class="product-card-grid ${tieneDeuda ? 'stock-low' : ''}" style="position: relative;">
                        ${tieneDeuda ? '<div class="stock-badge" style="background: var(--danger);">💸 Deuda</div>' : ''}
                        <div class="product-icon">
                            <i class="fas fa-user-circle"></i>
                        </div>
                        <div class="product-name">${c.nombre}</div>
                        <div class="product-price" style="color: ${tieneDeuda ? 'var(--danger)' : 'var(--success)'};">
                            ${tieneDeuda ? `Deuda: $${c.deuda.toFixed(2)}` : '✓ Sin deudas'}
                        </div>
                        <div class="product-stock">
                            ${c.telefono ? `<i class="fas fa-phone"></i> ${c.telefono}` : ''}
                            ${c.email ? `<br><i class="fas fa-envelope"></i> ${c.email}` : ''}
                        </div>
                        <div style="display: flex; gap: 8px; margin-top: 12px;">
                            ${tieneDeuda ? `
                                <button class="btn-pagar" data-id="${c.id}" style="flex: 1; background: var(--success); color: white; border: none; padding: 6px; border-radius: 6px; cursor: pointer;">
                                    <i class="fas fa-money-bill-wave"></i> Pagar
                                </button>
                            ` : ''}
                            <button class="btn-edit-client" data-id="${c.id}" style="flex: 1; background: var(--bg-tertiary); border: none; padding: 6px; border-radius: 6px; cursor: pointer;">
                                <i class="fas fa-edit"></i> Editar
                            </button>
                            <button class="btn-delete-client" data-id="${c.id}" style="flex: 1; background: var(--danger); color: white; border: none; padding: 6px; border-radius: 6px; cursor: pointer;">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
            
            // Eventos de los botones dinámicos
            document.querySelectorAll('.btn-pagar').forEach(btn => {
                btn.addEventListener('click', () => pagarDeuda(btn.dataset.id));
            });
            document.querySelectorAll('.btn-edit-client').forEach(btn => {
                btn.addEventListener('click', () => editarCliente(btn.dataset.id));
            });
            document.querySelectorAll('.btn-delete-client').forEach(btn => {
                btn.addEventListener('click', () => eliminarCliente(btn.dataset.id));
            });
        }
        
        function cargarHistorialPagos() {
            const pagos = JSON.parse(localStorage.getItem('pagos') || '[]');
            const pagosRecientes = pagos.sort((a,b) => new Date(b.fecha) - new Date(a.fecha)).slice(0, 10);
            
            const container = document.getElementById('historialPagos');
            if (pagosRecientes.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-receipt"></i> No hay pagos registrados</div>';
                return;
            }
            
            container.innerHTML = pagosRecientes.map(p => `
                <div class="cart-item-terminal" style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <strong><i class="fas fa-user"></i> ${p.clienteNombre}</strong>
                        <br>
                        <small><i class="fas fa-calendar"></i> ${new Date(p.fecha).toLocaleString()}</small>
                    </div>
                    <div style="text-align: right;">
                        <span style="color: var(--success); font-weight: bold; font-size: 1.1rem;">-$${p.monto.toFixed(2)}</span>
                    </div>
                </div>
            `).join('');
        }
        
        function pagarDeuda(id) {
            const monto = prompt('💰 ¿Cuánto va a pagar? (Ingrese el monto)');
            if (monto && !isNaN(parseFloat(monto)) && parseFloat(monto) > 0) {
                let clientes = JSON.parse(localStorage.getItem('clientes') || '[]');
                const index = clientes.findIndex(c => c.id === id);
                if (index !== -1) {
                    const pago = parseFloat(monto);
                    const deudaActual = clientes[index].deuda || 0;
                    
                    if (pago > deudaActual) {
                        alert(`⚠️ El cliente solo debe $${deudaActual.toFixed(2)}. Se ajustará el pago.`);
                        clientes[index].deuda = 0;
                    } else {
                        clientes[index].deuda = deudaActual - pago;
                    }
                    
                    // Registrar el pago
                    let pagos = JSON.parse(localStorage.getItem('pagos') || '[]');
                    pagos.push({
                        id: Date.now().toString(),
                        clienteId: id,
                        clienteNombre: clientes[index].nombre,
                        monto: pago,
                        fecha: new Date().toISOString()
                    });
                    localStorage.setItem('pagos', JSON.stringify(pagos));
                    localStorage.setItem('clientes', JSON.stringify(clientes));
                    
                    const deudaRestante = clientes[index].deuda;
                    if (deudaRestante === 0) {
                        alert(`✅ Pago completado. El cliente ya no tiene deudas.`);
                    } else {
                        alert(`✅ Pago registrado. Deuda restante: $${deudaRestante.toFixed(2)}`);
                    }
                    
                    cargarClientes();
                    cargarHistorialPagos();
                }
            } else if (monto) {
                alert('❌ Ingrese un monto válido');
            }
        }
        
        function editarCliente(id) {
            const clientes = JSON.parse(localStorage.getItem('clientes') || '[]');
            const cliente = clientes.find(c => c.id === id);
            if (cliente) {
                document.getElementById('cliNombre').value = cliente.nombre;
                document.getElementById('cliTelefono').value = cliente.telefono || '';
                document.getElementById('cliEmail').value = cliente.email || '';
                document.getElementById('formCliente').classList.remove('hidden');
                document.getElementById('btnAgregarCliente').style.display = 'none';
                
                // Guardar temporalmente el ID para edición
                window.editandoClienteId = id;
            }
        }
        
        function eliminarCliente(id) {
            if (confirm('⚠️ ¿Eliminar este cliente? Se perderá su historial de compras y deudas.')) {
                let clientes = JSON.parse(localStorage.getItem('clientes') || '[]');
                clientes = clientes.filter(c => c.id !== id);
                localStorage.setItem('clientes', JSON.stringify(clientes));
                cargarClientes();
                cargarHistorialPagos();
            }
        }
        
        // ==================== EVENTOS DEL FORMULARIO ====================
        
        document.getElementById('btnAgregarCliente').addEventListener('click', () => {
            window.editandoClienteId = null;
            document.getElementById('cliNombre').value = '';
            document.getElementById('cliTelefono').value = '';
            document.getElementById('cliEmail').value = '';
            document.getElementById('formCliente').classList.remove('hidden');
            document.getElementById('btnAgregarCliente').style.display = 'none';
        });
        
        document.getElementById('btnGuardarCliente').addEventListener('click', () => {
            const nombre = document.getElementById('cliNombre').value.trim();
            const telefono = document.getElementById('cliTelefono').value.trim();
            const email = document.getElementById('cliEmail').value.trim();
            
            if (!nombre) {
                alert('❌ Ingresa el nombre del cliente');
                return;
            }
            
            let clientes = JSON.parse(localStorage.getItem('clientes') || '[]');
            
            if (window.editandoClienteId) {
                const index = clientes.findIndex(c => c.id === window.editandoClienteId);
                if (index !== -1) {
                    clientes[index] = { 
                        ...clientes[index], 
                        nombre, 
                        telefono, 
                        email 
                    };
                    alert(`✅ Cliente "${nombre}" actualizado correctamente`);
                }
            } else {
                // Verificar si ya existe un cliente con el mismo nombre
                const existe = clientes.some(c => c.nombre.toLowerCase() === nombre.toLowerCase());
                if (existe) {
                    alert(`⚠️ Ya existe un cliente con el nombre "${nombre}"`);
                    return;
                }
                
                clientes.push({
                    id: Date.now().toString(),
                    nombre,
                    telefono,
                    email,
                    deuda: 0,
                    fechaRegistro: new Date().toISOString(),
                    ultimaCompra: null
                });
                alert(`✅ Cliente "${nombre}" agregado correctamente`);
            }
            
            localStorage.setItem('clientes', JSON.stringify(clientes));
            document.getElementById('formCliente').classList.add('hidden');
            document.getElementById('btnAgregarCliente').style.display = 'block';
            cargarClientes();
            cargarHistorialPagos();
        });
        
        document.getElementById('btnCancelarCliente').addEventListener('click', () => {
            document.getElementById('formCliente').classList.add('hidden');
            document.getElementById('btnAgregarCliente').style.display = 'block';
            window.editandoClienteId = null;
        });
        
        document.getElementById('buscarCliente').addEventListener('input', cargarClientes);
        
        // ==================== SIDEBAR MÓVIL ====================
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        
        function toggleSidebar() {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('open');
        }
        
        mobileMenuBtn?.addEventListener('click', toggleSidebar);
        overlay?.addEventListener('click', toggleSidebar);
        
        // ==================== TEMA OSCURO/CLARO ====================
        const themeToggle = document.getElementById('themeToggle');
        const themeStatus = document.getElementById('themeStatus');
        
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            themeStatus.textContent = theme === 'dark' ? '☀️' : '🌙';
        }
        
        const savedTheme = localStorage.getItem('theme') || 'light';
        setTheme(savedTheme);
        
        themeToggle?.addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            setTheme(current === 'dark' ? 'light' : 'dark');
        });
        
        // ==================== COLORES ALTERNATIVOS ====================
        const colorDots = document.querySelectorAll('.color-dot');
        
        function setColor(color) {
            document.documentElement.setAttribute('data-color', color);
            localStorage.setItem('colorTheme', color);
            colorDots.forEach(dot => {
                dot.classList.toggle('active', dot.dataset.color === color);
            });
        }
        
        const savedColor = localStorage.getItem('colorTheme') || 'default';
        setColor(savedColor);
        
        colorDots.forEach(dot => {
            dot.addEventListener('click', () => {
                setColor(dot.dataset.color);
            });
        });
        
        // ==================== INICIALIZAR ====================
        cargarClientes();
        cargarHistorialPagos();
    </script>
</body>
</html>
