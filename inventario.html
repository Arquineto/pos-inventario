<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario - POS Terminal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#2563eb">
<link rel="manifest" href="manifest.json">
    <style>
        .view-toggle {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .view-btn {
            padding: 6px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .view-btn.active {
            background: var(--primary);
            color: white;
        }
        .products-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .product-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }
        .form-field-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 4px;
            display: block;
        }
        .form-row {
            margin-bottom: 12px;
        }
        .stock-history {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header"><h1>POS_TERMINAL<span class="terminal-cursor"></span></h1><small>Inventario</small></div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item"><i class="fas fa-chart-line"></i><span>Dashboard</span></a>
                <a href="ventas.html" class="nav-item"><i class="fas fa-cash-register"></i><span>Punto de Venta</span></a>
                <a href="inventario.html" class="nav-item active"><i class="fas fa-boxes"></i><span>Inventario</span></a>
                <a href="clientes.html" class="nav-item"><i class="fas fa-users"></i><span>Clientes</span></a>
                <a href="reportes.html" class="nav-item"><i class="fas fa-chart-line"></i><span>Reportes</span></a>
                <a href="ventas-dia.html" class="nav-item"><i class="fas fa-chart-simple"></i><span>IPV del Día</span></a>
                <a href="cierre-caja.html" class="nav-item"><i class="fas fa-calculator"></i><span>Cierre de Caja</span></a>
                <a href="reporte-iva.html" class="nav-item"><i class="fas fa-file-invoice-dollar"></i><span>Reporte IVA</span></a>
                <a href="configuracion.html" class="nav-item"><i class="fas fa-cog"></i><span>Configuración</span></a>
            </nav>
            <div class="sidebar-footer">
                <div class="theme-toggle" id="themeToggle"><span><i class="fas fa-moon"></i> Modo oscuro</span><span id="themeStatus">🌙</span></div>
                <div class="color-options"><div class="color-dot" data-color="default" style="background:#2563eb"></div><div class="color-dot" data-color="emerald" style="background:#10b981"></div><div class="color-dot" data-color="violet" style="background:#8b5cf6"></div><div class="color-dot" data-color="rose" style="background:#f43f5e"></div><div class="color-dot" data-color="amber" style="background:#f59e0b"></div></div>
            </div>
        </aside>
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <main class="main-content">
            <div class="mobile-header"><button class="mobile-menu-btn" id="mobileMenuBtn"><i class="fas fa-bars"></i></button><h2><i class="fas fa-boxes"></i> Inventario</h2><div></div></div>

            <div class="terminal-card">
                <h2><i class="fas fa-plus-circle"></i> Agregar/Editar Producto</h2>
                <button id="btnAgregar" class="btn-terminal btn-terminal-primary" style="margin-bottom:16px;">+ Nuevo Producto</button>
                <div id="formProducto" class="hidden">
                    <div class="form-row"><label class="form-field-label"><i class="fas fa-barcode"></i> Código de barras (opcional)</label><input type="text" id="prodCodigo" class="terminal-input" placeholder="Ej: 7501234567890"></div>
                    <div class="form-row"><label class="form-field-label"><i class="fas fa-tag"></i> Nombre del producto *</label><input type="text" id="prodNombre" class="terminal-input" placeholder="Ej: Café molido 500g"></div>
                    <div class="form-row"><label class="form-field-label"><i class="fas fa-dollar-sign"></i> Costo de compra</label><input type="number" id="prodCosto" class="terminal-input" placeholder="Ej: 65.00" step="0.01"></div>
                    <div class="form-row"><label class="form-field-label"><i class="fas fa-tag"></i> Precio de venta *</label><input type="number" id="prodPrecio" class="terminal-input" placeholder="Ej: 89.90" step="0.01"></div>
                    <div class="form-row"><label class="form-field-label"><i class="fas fa-cubes"></i> Cantidad en stock *</label><input type="number" id="prodStock" class="terminal-input" placeholder="Ej: 25"></div>
                    <div class="form-row"><label class="form-field-label"><i class="fas fa-exclamation-triangle"></i> Stock mínimo (alerta)</label><input type="number" id="prodStockMinimo" class="terminal-input" placeholder="Ej: 5" value="5"></div>
                    <div class="form-row"><label class="form-field-label"><i class="fas fa-folder"></i> Categoría</label><input type="text" id="prodCategoria" class="terminal-input" placeholder="Ej: Alimentos, Bebidas, Limpieza"></div>
                    <div style="display:flex; gap:12px;"><button id="btnGuardar" class="btn-terminal btn-terminal-primary">Guardar</button><button id="btnCancelar" class="btn-terminal">Cancelar</button></div>
                </div>
            </div>

            <div class="terminal-card">
                <h2><i class="fas fa-search"></i> Productos</h2>
                <div style="display:flex; gap:12px; margin-bottom:16px;">
                    <input type="text" id="buscarProducto" class="terminal-input" style="flex:1;" placeholder="🔍 Buscar por nombre, código...">
                    <select id="ordenarPor" class="terminal-input" style="width:150px;"><option value="nombre">Nombre A-Z</option><option value="categoria">Categoría</option><option value="precio">Precio</option><option value="stock">Stock</option></select>
                </div>
                <div class="view-toggle">
                    <button class="view-btn active" data-view="grid"><i class="fas fa-th"></i> Grid</button>
                    <button class="view-btn" data-view="list"><i class="fas fa-list"></i> Lista</button>
                </div>
                <div id="alertStockBajo" class="alert-banner hidden" style="background:rgba(239,68,68,0.2); color:var(--danger); padding:12px; border-radius:8px; margin-bottom:16px;">⚠️ Productos con stock bajo</div>
                <div id="listaInventario"></div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
    <script src="storage-manager.js"></script>
    <script>
        let editandoId = null;
        let productos = [];
        let currentView = 'grid';
        let stockOriginal = 0;

        async function cargarInventario() {
            productos = await storage.getData('productos');
            const busqueda = document.getElementById('buscarProducto').value.toLowerCase();
            const orden = document.getElementById('ordenarPor').value;
            let filtrados = productos.filter(p => p.nombre.toLowerCase().includes(busqueda) || (p.codigo && p.codigo.toLowerCase().includes(busqueda)));
            if(orden === 'nombre') filtrados.sort((a,b)=>a.nombre.localeCompare(b.nombre));
            else if(orden === 'categoria') filtrados.sort((a,b)=>(a.categoria||'').localeCompare(b.categoria||''));
            else if(orden === 'precio') filtrados.sort((a,b)=>a.precio - b.precio);
            else if(orden === 'stock') filtrados.sort((a,b)=>a.stock - b.stock);
            const stockBajo = productos.filter(p => p.stock <= (p.stockMinimo || 5));
            document.getElementById('alertStockBajo').classList.toggle('hidden', stockBajo.length === 0);
            
            const lista = document.getElementById('listaInventario');
            if(!filtrados.length){ lista.innerHTML='<div class="empty-state">📭 No hay productos</div>'; return; }
            
            if(currentView === 'grid') {
                lista.className = 'products-grid';
                lista.innerHTML = filtrados.map(p => {
                    const stockMin = p.stockMinimo || 5;
                    const margen = p.costo ? (((p.precio - p.costo) / p.precio) * 100).toFixed(1) : 'N/A';
                    return `<div class="product-card-grid ${p.stock <= stockMin ? 'stock-low' : ''}">
                        ${p.stock <= stockMin ? '<div class="stock-badge">⚠️ Stock bajo</div>' : ''}
                        <div class="product-icon"><i class="fas fa-cube"></i></div>
                        <div class="product-name">${p.nombre}</div>
                        <div class="product-price">$${p.precio.toFixed(2)}</div>
                        <div class="product-stock">Stock: ${p.stock} / ${stockMin}</div>
                        <div class="product-category">${p.categoria || 'Sin categoría'}</div>
                        <div class="product-margin">Margen: ${margen}%</div>
                        <div style="display:flex; gap:8px; margin-top:12px;">
                            <button class="btn-edit" data-id="${p.id}" style="flex:1; background:var(--bg-tertiary); border:none; padding:6px; border-radius:6px;"><i class="fas fa-edit"></i> Editar</button>
                            <button class="btn-delete" data-id="${p.id}" style="flex:1; background:var(--danger); color:white; border:none; padding:6px; border-radius:6px;"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>`;
                }).join('');
            } else {
                lista.className = 'products-list';
                lista.innerHTML = filtrados.map(p => {
                    const margen = p.costo ? (((p.precio - p.costo) / p.precio) * 100).toFixed(1) : 'N/A';
                    return `<div class="product-list-item ${p.stock <= (p.stockMinimo||5) ? 'stock-low' : ''}">
                        <div><strong>${p.nombre}</strong><br><small>Cód: ${p.codigo || '-'} | Cat: ${p.categoria || '-'}</small></div>
                        <div>$${p.precio.toFixed(2)}</div>
                        <div>Stock: ${p.stock}</div>
                        <div>Margen: ${margen}%</div>
                        <div><button class="btn-edit" data-id="${p.id}" style="background:var(--bg-tertiary); border:none; padding:4px 8px; border-radius:4px;"><i class="fas fa-edit"></i></button>
                        <button class="btn-delete" data-id="${p.id}" style="background:var(--danger); color:white; border:none; padding:4px 8px; border-radius:4px;"><i class="fas fa-trash"></i></button></div>
                    </div>`;
                }).join('');
            }
            
            document.querySelectorAll('.btn-edit').forEach(btn=>btn.addEventListener('click',()=>editarProducto(btn.dataset.id)));
            document.querySelectorAll('.btn-delete').forEach(btn=>btn.addEventListener('click',()=>eliminarProducto(btn.dataset.id)));
        }

        async function editarProducto(id) {
            const p = productos.find(p=>p.id===id);
            if(p){
                editandoId=id;
                stockOriginal = p.stock;
                document.getElementById('prodCodigo').value=p.codigo||'';
                document.getElementById('prodNombre').value=p.nombre;
                document.getElementById('prodCosto').value=p.costo||'';
                document.getElementById('prodPrecio').value=p.precio;
                document.getElementById('prodStock').value=p.stock;
                document.getElementById('prodStockMinimo').value=p.stockMinimo||5;
                document.getElementById('prodCategoria').value=p.categoria||'';
                document.getElementById('formProducto').classList.remove('hidden');
                document.getElementById('btnAgregar').style.display='none';
            }
        }

        async function eliminarProducto(id) {
            if(confirm('¿Eliminar producto?')){
                productos = productos.filter(p=>p.id!==id);
                await storage.saveData('productos',productos);
                cargarInventario();
            }
        }

        function verificarDuplicados(nombre, codigo) {
            const existente = productos.find(p => (p.nombre.toLowerCase() === nombre.toLowerCase()) || (codigo && p.codigo === codigo));
            if(existente && (!editandoId || existente.id !== editandoId)) return true;
            return false;
        }

        async function registrarEntradaStock(productoId, cantidadAnterior, cantidadNueva, motivo) {
            if(cantidadNueva > cantidadAnterior) {
                const entradas = await storage.getData('entradas_stock') || [];
                entradas.push({
                    id: Date.now().toString(),
                    productoId: productoId,
                    cantidad: cantidadNueva - cantidadAnterior,
                    fecha: new Date().toISOString(),
                    motivo: motivo
                });
                await storage.saveData('entradas_stock', entradas);
            }
        }

        document.getElementById('btnAgregar').addEventListener('click',()=>{
            editandoId=null;
            stockOriginal=0;
            document.getElementById('prodCodigo').value='';
            document.getElementById('prodNombre').value='';
            document.getElementById('prodCosto').value='';
            document.getElementById('prodPrecio').value='';
            document.getElementById('prodStock').value='';
            document.getElementById('prodStockMinimo').value='5';
            document.getElementById('prodCategoria').value='';
            document.getElementById('formProducto').classList.remove('hidden');
            document.getElementById('btnAgregar').style.display='none';
        });

        document.getElementById('btnGuardar').addEventListener('click',async()=>{
            const codigo = document.getElementById('prodCodigo').value.trim();
            const nombre = document.getElementById('prodNombre').value.trim();
            const costo = parseFloat(document.getElementById('prodCosto').value) || 0;
            const precio = parseFloat(document.getElementById('prodPrecio').value);
            const stock = parseInt(document.getElementById('prodStock').value);
            const stockMinimo = parseInt(document.getElementById('prodStockMinimo').value) || 5;
            const categoria = document.getElementById('prodCategoria').value.trim();
            if(!nombre || isNaN(precio) || isNaN(stock)){ alert('Completa los campos obligatorios (*)'); return; }
            if(verificarDuplicados(nombre, codigo)){ alert('Ya existe un producto con ese nombre o código'); return; }
            
            if(editandoId){
                const idx = productos.findIndex(p=>p.id===editandoId);
                if(idx!==-1) {
                    const stockAnterior = productos[idx].stock;
                    await registrarEntradaStock(editandoId, stockAnterior, stock, 'Edición de producto');
                    productos[idx] = {...productos[idx], codigo, nombre, costo, precio, stock, stockMinimo, categoria};
                }
            } else {
                productos.push({ id:Date.now().toString(), codigo, nombre, costo, precio, stock, stockMinimo, categoria });
            }
            await storage.saveData('productos',productos);
            document.getElementById('formProducto').classList.add('hidden');
            document.getElementById('btnAgregar').style.display='block';
            cargarInventario();
        });

        document.getElementById('btnCancelar').addEventListener('click',()=>{
            document.getElementById('formProducto').classList.add('hidden');
            document.getElementById('btnAgregar').style.display='block';
        });

        document.getElementById('buscarProducto').addEventListener('input',cargarInventario);
        document.getElementById('ordenarPor').addEventListener('change',cargarInventario);
        
        document.querySelectorAll('.view-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentView = btn.dataset.view;
                cargarInventario();
            });
        });

        cargarInventario();

        const sidebar=document.getElementById('sidebar'), overlay=document.getElementById('sidebarOverlay'), mobileBtn=document.getElementById('mobileMenuBtn');
        mobileBtn?.addEventListener('click',()=>{ sidebar.classList.toggle('open'); overlay.classList.toggle('open'); });
        overlay?.addEventListener('click',()=>{ sidebar.classList.remove('open'); overlay.classList.remove('open'); });
        const themeToggle=document.getElementById('themeToggle'), savedTheme=localStorage.getItem('theme')||'light';
        document.documentElement.setAttribute('data-theme',savedTheme);
        themeToggle.querySelector('#themeStatus').textContent=savedTheme==='dark'?'☀️':'🌙';
        themeToggle.addEventListener('click',()=>{ const curr=document.documentElement.getAttribute('data-theme'); const nue=curr==='dark'?'light':'dark'; document.documentElement.setAttribute('data-theme',nue); localStorage.setItem('theme',nue); themeToggle.querySelector('#themeStatus').textContent=nue==='dark'?'☀️':'🌙'; });
        const colorDots=document.querySelectorAll('.color-dot'), savedColor=localStorage.getItem('colorTheme')||'default';
        document.documentElement.setAttribute('data-color',savedColor);
        colorDots.forEach(dot=>{ dot.classList.toggle('active',dot.dataset.color===savedColor); dot.addEventListener('click',()=>{ const col=dot.dataset.color; document.documentElement.setAttribute('data-color',col); localStorage.setItem('colorTheme',col); colorDots.forEach(d=>d.classList.remove('active')); dot.classList.add('active'); }); });
    </script>
</body>
</html>
