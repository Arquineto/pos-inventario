<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punto de Venta</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="app-container">
        <div class="header-actions">
            <a href="index.html" class="btn-back">← Volver</a>
            <h2>🛒 Punto de Venta</h2>
        </div>

        <div class="scanner-section">
            <label>📷 Escanear código de barras:</label>
            <input type="text" id="codigoEscaneado" placeholder="Escanear o escribir código" autofocus>
            <button id="btnBuscar" class="btn-secondary">Buscar</button>
        </div>

        <div class="cart-section">
            <h3>Carrito de compra</h3>
            <div id="carritoLista" class="cart-list"></div>
            <div class="cart-total">
                <strong>Total: $<span id="totalCarrito">0</span></strong>
                <button id="btnFinalizar" class="btn-success">💰 Finalizar Venta</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        let carrito = [];
        
        function agregarAlCarrito(productoId) {
            const productos = JSON.parse(localStorage.getItem('productos') || '[]');
            const producto = productos.find(p => p.id === productoId);
            
            if (!producto) {
                alert('Producto no encontrado');
                return;
            }
            
            if (producto.stock <= 0) {
                alert('Producto sin stock disponible');
                return;
            }
            
            const itemExistente = carrito.find(i => i.id === productoId);
            if (itemExistente) {
                itemExistente.cantidad++;
            } else {
                carrito.push({
                    id: producto.id,
                    nombre: producto.nombre,
                    precio: producto.precio,
                    cantidad: 1
                });
            }
            
            actualizarCarrito();
        }
        
        function actualizarCarrito() {
            const carritoDiv = document.getElementById('carritoLista');
            let total = 0;
            
            if (carrito.length === 0) {
                carritoDiv.innerHTML = '<div class="empty-cart">🛍️ Carrito vacío</div>';
                document.getElementById('totalCarrito').textContent = '0';
                return;
            }
            
            carritoDiv.innerHTML = carrito.map((item, index) => {
                const subtotal = item.precio * item.cantidad;
                total += subtotal;
                return `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <strong>${item.nombre}</strong>
                            <span>$${item.precio} x ${item.cantidad}</span>
                            <span>= $${subtotal}</span>
                        </div>
                        <div class="cart-item-actions">
                            <button class="btn-qty" data-index="${index}" data-delta="-1">-</button>
                            <span>${item.cantidad}</span>
                            <button class="btn-qty" data-index="${index}" data-delta="1">+</button>
                            <button class="btn-remove" data-index="${index}">🗑️</button>
                        </div>
                    </div>
                `;
            }).join('');
            
            document.getElementById('totalCarrito').textContent = total;
            
            document.querySelectorAll('.btn-qty').forEach(btn => {
                btn.addEventListener('click', () => {
                    const index = parseInt(btn.dataset.index);
                    const delta = parseInt(btn.dataset.delta);
                    const nuevaCantidad = carrito[index].cantidad + delta;
                    if (nuevaCantidad <= 0) {
                        carrito.splice(index, 1);
                    } else {
                        carrito[index].cantidad = nuevaCantidad;
                    }
                    actualizarCarrito();
                });
            });
            
            document.querySelectorAll('.btn-remove').forEach(btn => {
                btn.addEventListener('click', () => {
                    const index = parseInt(btn.dataset.index);
                    carrito.splice(index, 1);
                    actualizarCarrito();
                });
            });
        }
        
        document.getElementById('btnBuscar').addEventListener('click', () => {
            const codigo = document.getElementById('codigoEscaneado').value.trim();
            const productos = JSON.parse(localStorage.getItem('productos') || '[]');
            const producto = productos.find(p => p.codigo === codigo);
            
            if (producto) {
                agregarAlCarrito(producto.id);
                document.getElementById('codigoEscaneado').value = '';
                document.getElementById('codigoEscaneado').focus();
            } else {
                alert('Producto no encontrado. Agrégalo primero en Inventario.');
            }
        });
        
        document.getElementById('codigoEscaneado').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('btnBuscar').click();
            }
        });
        
        document.getElementById('btnFinalizar').addEventListener('click', () => {
            if (carrito.length === 0) {
                alert('No hay productos en el carrito');
                return;
            }
            
            let productos = JSON.parse(localStorage.getItem('productos') || '[]');
            let ventas = JSON.parse(localStorage.getItem('ventas') || '[]');
            let totalVenta = 0;
            
            for (const item of carrito) {
                const productoIndex = productos.findIndex(p => p.id === item.id);
                if (productoIndex !== -1) {
                    productos[productoIndex].stock -= item.cantidad;
                    totalVenta += item.precio * item.cantidad;
                }
            }
            
            const nuevaVenta = {
                id: Date.now().toString(),
                fecha: new Date().toISOString(),
                items: [...carrito],
                total: totalVenta
            };
            
            ventas.push(nuevaVenta);
            localStorage.setItem('productos', JSON.stringify(productos));
            localStorage.setItem('ventas', JSON.stringify(ventas));
            
            carrito = [];
            actualizarCarrito();
            alert(`✅ Venta realizada por $${totalVenta}`);
        });
    </script>
</body>
</html>
