<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cierre de Caja - POS Terminal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#2563eb">
<link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header"><h1>POS_TERMINAL<span class="terminal-cursor"></span></h1><small>Cierre de Caja</small></div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item"><i class="fas fa-chart-line"></i><span>Dashboard</span></a>
                <a href="ventas.html" class="nav-item"><i class="fas fa-cash-register"></i><span>Punto de Venta</span></a>
                <a href="inventario.html" class="nav-item"><i class="fas fa-boxes"></i><span>Inventario</span></a>
                <a href="clientes.html" class="nav-item"><i class="fas fa-users"></i><span>Clientes</span></a>
                <a href="reportes.html" class="nav-item"><i class="fas fa-chart-line"></i><span>Reportes</span></a>
                <a href="ventas-dia.html" class="nav-item"><i class="fas fa-chart-simple"></i><span>IPV del Día</span></a>
                <a href="cierre-caja.html" class="nav-item active"><i class="fas fa-calculator"></i><span>Cierre de Caja</span></a>
                <a href="reporte-iva.html" class="nav-item"><i class="fas fa-file-invoice-dollar"></i><span>Reporte IVA</span></a>
                <a href="configuracion.html" class="nav-item"><i class="fas fa-cog"></i><span>Configuración</span></a>
            </nav>
            <div class="sidebar-footer">
                <div class="theme-toggle" id="themeToggle"><span><i class="fas fa-moon"></i> Modo oscuro</span><span id="themeStatus">🌙</span></div>
                <div class="color-options"><div class="color-dot" data-color="default" style="background:#2563eb"></div><div class="color-dot" data-color="emerald" style="background:#10b981"></div><div class="color-dot" data-color="violet" style="background:#8b5cf6"></div><div class="color-dot" data-color="rose" style="background:#f43f5e"></div><div class="color-dot" data-color="amber" style="background:#f59e0b"></div></div>
            </div>
        </aside>
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <main class="main-content">
            <div class="mobile-header"><button class="mobile-menu-btn" id="mobileMenuBtn"><i class="fas fa-bars"></i></button><h2><i class="fas fa-calculator"></i> Cierre de Caja</h2><div></div></div>

            <div class="terminal-card">
                <h2><i class="fas fa-calendar"></i> Seleccionar fecha</h2>
                <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                    <input type="date" id="fechaCierre" class="terminal-input" style="width: auto;">
                    <button id="btnCargarDia" class="btn-terminal"><i class="fas fa-search"></i> Cargar</button>
                    <button id="btnHoy" class="btn-terminal"><i class="fas fa-sun"></i> Hoy</button>
                </div>
            </div>

            <div class="terminal-card">
                <h2><i class="fas fa-chart-line"></i> Resumen del día</h2>
                <div id="resumenDia" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;"></div>
            </div>

            <div class="terminal-card">
                <h2><i class="fas fa-receipt"></i> Ventas del día</h2>
                <div id="ventasDia" style="max-height: 300px; overflow-y: auto;"></div>
            </div>

            <div class="terminal-card">
                <h2><i class="fas fa-money-bill-wave"></i> Conteo de efectivo físico</h2>
                <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px;">
                    <div><label>Billetes de $1000</label><input type="number" id="billete1000" class="terminal-input" value="0" min="0"></div>
                    <div><label>Billetes de $500</label><input type="number" id="billete500" class="terminal-input" value="0" min="0"></div>
                    <div><label>Billetes de $200</label><input type="number" id="billete200" class="terminal-input" value="0" min="0"></div>
                    <div><label>Billetes de $100</label><input type="number" id="billete100" class="terminal-input" value="0" min="0"></div>
                    <div><label>Billetes de $50</label><input type="number" id="billete50" class="terminal-input" value="0" min="0"></div>
                    <div><label>Billetes de $20</label><input type="number" id="billete20" class="terminal-input" value="0" min="0"></div>
                    <div><label>Billetes de $10</label><input type="number" id="billete10" class="terminal-input" value="0" min="0"></div>
                    <div><label>Billetes de $5</label><input type="number" id="billete5" class="terminal-input" value="0" min="0"></div>
                    <div><label>Billetes de $2</label><input type="number" id="billete2" class="terminal-input" value="0" min="0"></div>
                    <div><label>Billetes de $1</label><input type="number" id="billete1" class="terminal-input" value="0" min="0"></div>
                    <div><label>Monedas</label><input type="number" id="monedas" class="terminal-input" value="0" min="0" step="0.01"></div>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center; padding: 12px; background: var(--bg-tertiary); border-radius: 8px;">
                    <strong>Total efectivo contado:</strong>
                    <strong id="totalContado" style="font-size: 1.2rem;">$0</strong>
                </div>
                <button id="btnCalcularDiferencia" class="btn-terminal btn-terminal-primary" style="margin-top: 16px;"><i class="fas fa-calculator"></i> Calcular diferencia</button>
                <button id="btnExportarPDF" class="btn-terminal" style="margin-top: 12px; background: var(--danger);"><i class="fas fa-file-pdf"></i> Exportar Reporte PDF</button>
            </div>

            <div id="panelDiferencia" class="terminal-card" style="display: none;">
                <h2><i class="fas fa-chart-line"></i> Resultado del cierre</h2>
                <div id="resultadoCierre"></div>
            </div>

            <div id="reportePDF" style="display: none; padding: 20px; background: white; color: black;">
                <!-- Contenido para PDF -->
            </div>
        </main>
    </div>

    <script src="app.js"></script>
    <script src="storage-manager.js"></script>
    <script>
        let cajaDiaria = [];
        let ventas = [];
        let productos = [];
        let fechaActual = new Date().toISOString().split('T')[0];

        async function cargarDatos() {
            cajaDiaria = await storage.getData('caja_diaria');
            ventas = await storage.getData('ventas');
            productos = await storage.getData('productos');
        }

        function calcularTotalContado() {
            const billete1000 = parseInt(document.getElementById('billete1000').value) || 0;
            const billete500 = parseInt(document.getElementById('billete500').value) || 0;
            const billete200 = parseInt(document.getElementById('billete200').value) || 0;
            const billete100 = parseInt(document.getElementById('billete100').value) || 0;
            const billete50 = parseInt(document.getElementById('billete50').value) || 0;
            const billete20 = parseInt(document.getElementById('billete20').value) || 0;
            const billete10 = parseInt(document.getElementById('billete10').value) || 0;
            const billete5 = parseInt(document.getElementById('billete5').value) || 0;
            const billete2 = parseInt(document.getElementById('billete2').value) || 0;
            const billete1 = parseInt(document.getElementById('billete1').value) || 0;
            const monedas = parseFloat(document.getElementById('monedas').value) || 0;
            
            const total = (billete1000 * 1000) + (billete500 * 500) + (billete200 * 200) + (billete100 * 100) + 
                         (billete50 * 50) + (billete20 * 20) + (billete10 * 10) + (billete5 * 5) + 
                         (billete2 * 2) + (billete1 * 1) + monedas;
            document.getElementById('totalContado').textContent = `$${total.toFixed(2)}`;
            return total;
        }

        document.querySelectorAll('#billete1000, #billete500, #billete200, #billete100, #billete50, #billete20, #billete10, #billete5, #billete2, #billete1, #monedas').forEach(el => {
            el.addEventListener('input', calcularTotalContado);
        });

        async function cargarDia(fecha) {
            await cargarDatos();
            fechaActual = fecha;
            document.getElementById('fechaCierre').value = fecha;

            const diaCaja = cajaDiaria.find(d => d.fecha === fecha) || { 
                fecha, ventas: [], total_efectivo: 0, total_tarjeta: 0, 
                total_transferencia: 0, total_credito: 0, total_ventas: 0 
            };
            const ventasDelDia = ventas.filter(v => v.fecha.split('T')[0] === fecha);

            const resumen = document.getElementById('resumenDia');
            resumen.innerHTML = `
                <div class="stat-box" style="background: var(--bg-tertiary); padding: 16px; border-radius: 12px; text-align: center;">
                    <i class="fas fa-dollar-sign" style="font-size: 1.5rem; color: var(--success);"></i>
                    <h4>Total ventas</h4>
                    <p style="font-size: 1.2rem;">$${diaCaja.total_ventas.toFixed(2)}</p>
                </div>
                <div class="stat-box" style="background: var(--bg-tertiary); padding: 16px; border-radius: 12px; text-align: center;">
                    <i class="fas fa-money-bill-wave" style="font-size: 1.5rem;"></i>
                    <h4>Efectivo</h4>
                    <p>$${diaCaja.total_efectivo.toFixed(2)}</p>
                </div>
                <div class="stat-box" style="background: var(--bg-tertiary); padding: 16px; border-radius: 12px; text-align: center;">
                    <i class="fas fa-qrcode" style="font-size: 1.5rem;"></i>
                    <h4>Transferencias</h4>
                    <p>$${diaCaja.total_transferencia.toFixed(2)}</p>
                </div>
                <div class="stat-box" style="background: var(--bg-tertiary); padding: 16px; border-radius: 12px; text-align: center;">
                    <i class="fas fa-hand-holding-usd" style="font-size: 1.5rem;"></i>
                    <h4>Deudas</h4>
                    <p>$${diaCaja.total_credito.toFixed(2)}</p>
                </div>
            `;

            const ventasDiv = document.getElementById('ventasDia');
            if (ventasDelDia.length === 0) {
                ventasDiv.innerHTML = '<div class="empty-state">No hay ventas en este día</div>';
            } else {
                ventasDiv.innerHTML = ventasDelDia.map(v => `
                    <div style="padding: 10px; border-bottom: 1px solid var(--border-color);">
                        <div style="display: flex; justify-content: space-between;">
                            <strong>Factura #${v.factura || v.id.slice(-4)}</strong>
                            <strong>$${v.total.toFixed(2)}</strong>
                        </div>
                        <div style="font-size: 0.8rem;">${new Date(v.fecha).toLocaleString()}</div>
                        <div style="font-size: 0.75rem;">${v.metodo === 'combinado' ? Object.entries(v.pagos || {}).filter(([k,val]) => val > 0).map(([k,val]) => `${k}: $${val}`).join(' | ') : v.metodo}</div>
                    </div>
                `).join('');
            }
        }

        document.getElementById('btnCalcularDiferencia').addEventListener('click', async () => {
            await cargarDatos();
            const totalContado = calcularTotalContado();
            const diaCaja = cajaDiaria.find(d => d.fecha === fechaActual) || { total_efectivo: 0 };
            const diferencia = totalContado - diaCaja.total_efectivo;

            const panel = document.getElementById('panelDiferencia');
            panel.style.display = 'block';

            const resultado = document.getElementById('resultadoCierre');
            resultado.innerHTML = `
                <div style="padding: 16px; text-align: center;">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px;">
                        <div style="background: var(--bg-tertiary); padding: 12px; border-radius: 8px;">
                            <p><strong>Efectivo según sistema:</strong></p>
                            <p style="font-size: 1.2rem;">$${diaCaja.total_efectivo.toFixed(2)}</p>
                        </div>
                        <div style="background: var(--bg-tertiary); padding: 12px; border-radius: 8px;">
                            <p><strong>Efectivo contado:</strong></p>
                            <p style="font-size: 1.2rem;">$${totalContado.toFixed(2)}</p>
                        </div>
                    </div>
                    <div style="padding: 16px; border-radius: 12px; background: ${diferencia >= 0 ? 'rgba(16,185,129,0.2)' : 'rgba(239,68,68,0.2)'};">
                        <p style="font-size: 1.2rem; font-weight: bold;">
                            Diferencia: ${diferencia >= 0 ? '+' : ''}$${diferencia.toFixed(2)}
                            ${diferencia > 0 ? '(Sobrante)' : diferencia < 0 ? '(Faltante)' : '(Exacto)'}
                        </p>
                    </div>
                </div>
            `;
        });

        document.getElementById('btnExportarPDF').addEventListener('click', async () => {
            await cargarDatos();
            const diaCaja = cajaDiaria.find(d => d.fecha === fechaActual) || { 
                fecha: fechaActual, total_ventas: 0, total_efectivo: 0, 
                total_transferencia: 0, total_credito: 0 
            };
            const ventasDelDia = ventas.filter(v => v.fecha.split('T')[0] === fechaActual);
            
            // Calcular productos vendidos del día
            const productosVendidos = {};
            ventasDelDia.forEach(v => {
                v.items.forEach(item => {
                    if (!productosVendidos[item.nombre]) {
                        productosVendidos[item.nombre] = { cantidad: 0, total: 0 };
                    }
                    productosVendidos[item.nombre].cantidad += item.cantidad;
                    productosVendidos[item.nombre].total += item.precio * item.cantidad;
                });
            });

            const reporteHTML = `
                <div style="font-family: monospace; max-width: 800px; margin: 0 auto;">
                    <div style="text-align: center; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 20px;">
                        <h1>CIERRE DE CAJA</h1>
                        <p><strong>Fecha:</strong> ${new Date(fechaActual).toLocaleDateString()}</p>
                        <p><strong>Hora de cierre:</strong> ${new Date().toLocaleTimeString()}</p>
                    </div>
                    
                    <div style="margin-bottom: 20px;">
                        <h3>RESUMEN DEL DÍA</h3>
                        <table style="width: 100%; border-collapse: collapse;">
                            <tr><td style="padding: 5px;"><strong>Total Ventas:</strong></td><td style="text-align: right;">$${diaCaja.total_ventas.toFixed(2)}</td></tr>
                            <tr><td style="padding: 5px;"><strong>Efectivo:</strong></td><td style="text-align: right;">$${diaCaja.total_efectivo.toFixed(2)}</td></tr>
                            <tr><td style="padding: 5px;"><strong>Transferencias:</strong></td><td style="text-align: right;">$${diaCaja.total_transferencia.toFixed(2)}</td></tr>
                            <tr><td style="padding: 5px;"><strong>Deudas (Crédito):</strong></td><td style="text-align: right;">$${diaCaja.total_credito.toFixed(2)}</td></tr>
                        </table>
                    </div>
                    
                    <div style="margin-bottom: 20px;">
                        <h3>VENTAS DEL DÍA</h3>
                        <table style="width: 100%; border-collapse: collapse; border: 1px solid #ddd;">
                            <thead>
                                <tr style="background: #f0f0f0;"><th>Factura</th><th>Hora</th><th>Total</th><th>Método</th></tr>
                            </thead>
                            <tbody>
                                ${ventasDelDia.map(v => `
                                    <tr><td>${v.factura || v.id.slice(-4)}</td><td>${new Date(v.fecha).toLocaleTimeString()}</td><td style="text-align: right;">$${v.total.toFixed(2)}</td><td>${v.metodo === 'combinado' ? 'Múltiple' : v.metodo}</td></tr>
                                `).join('')}
                                ${ventasDelDia.length === 0 ? '<tr><td colspan="4" style="text-align: center;">No hay ventas</td></tr>' : ''}
                            </tbody>
                        </table>
                    </div>
                    
                    <div>
                        <h3>DETALLE DE PRODUCTOS VENDIDOS</h3>
                        <table style="width: 100%; border-collapse: collapse; border: 1px solid #ddd;">
                            <thead>
                                <tr style="background: #f0f0f0;"><th>Producto</th><th>Cantidad</th><th>Total</th></tr>
                            </thead>
                            <tbody>
                                ${Object.entries(productosVendidos).map(([nombre, data]) => `
                                    <tr><td>${nombre}</td><td style="text-align: center;">${data.cantidad}</td><td style="text-align: right;">$${data.total.toFixed(2)}</td></tr>
                                `).join('')}
                                ${Object.keys(productosVendidos).length === 0 ? '<tr><td colspan="3" style="text-align: center;">No hay productos vendidos</td></tr>' : ''}
                            </tbody>
                        </table>
                    </div>
                    
                    <div style="margin-top: 30px; text-align: center; font-size: 10px; border-top: 1px solid #ccc; padding-top: 10px;">
                        <p>Reporte generado por POS Terminal</p>
                    </div>
                </div>
            `;

            const element = document.createElement('div');
            element.innerHTML = reporteHTML;
            document.body.appendChild(element);
            
            html2pdf().from(element).set({
                margin: [0.5, 0.5, 0.5, 0.5],
                filename: `cierre_caja_${fechaActual}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, letterRendering: true },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
            }).save().then(() => {
                document.body.removeChild(element);
            });
        });

        document.getElementById('btnCargarDia').addEventListener('click', () => {
            const fecha = document.getElementById('fechaCierre').value;
            if (fecha) cargarDia(fecha);
        });

        document.getElementById('btnHoy').addEventListener('click', () => {
            cargarDia(new Date().toISOString().split('T')[0]);
        });

        cargarDia(new Date().toISOString().split('T')[0]);

        const sidebar=document.getElementById('sidebar'), overlay=document.getElementById('sidebarOverlay'), mobileBtn=document.getElementById('mobileMenuBtn');
        mobileBtn?.addEventListener('click',()=>{ sidebar.classList.toggle('open'); overlay.classList.toggle('open'); });
        overlay?.addEventListener('click',()=>{ sidebar.classList.remove('open'); overlay.classList.remove('open'); });
        const themeToggle=document.getElementById('themeToggle'), savedTheme=localStorage.getItem('theme')||'light';
        document.documentElement.setAttribute('data-theme',savedTheme);
        themeToggle.querySelector('#themeStatus').textContent=savedTheme==='dark'?'☀️':'🌙';
        themeToggle.addEventListener('click',()=>{ const curr=document.documentElement.getAttribute('data-theme'); const nue=curr==='dark'?'light':'dark'; document.documentElement.setAttribute('data-theme',nue); localStorage.setItem('theme',nue); themeToggle.querySelector('#themeStatus').textContent=nue==='dark'?'☀️':'🌙'; });
        const colorDots=document.querySelectorAll('.color-dot'), savedColor=localStorage.getItem('colorTheme')||'default';
        document.documentElement.setAttribute('data-color',savedColor);
        colorDots.forEach(dot=>{ dot.classList.toggle('active',dot.dataset.color===savedColor); dot.addEventListener('click',()=>{ const col=dot.dataset.color; document.documentElement.setAttribute('data-color',col); localStorage.setItem('colorTheme',col); colorDots.forEach(d=>d.classList.remove('active')); dot.classList.add('active'); }); });
    </script>
</body>
</html>
