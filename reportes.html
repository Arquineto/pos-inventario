<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportes - POS Terminal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header"><h1>POS_TERMINAL<span class="terminal-cursor"></span></h1><small>Reportes</small></div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item"><i class="fas fa-chart-line"></i><span>Dashboard</span></a>
                <a href="ventas.html" class="nav-item"><i class="fas fa-cash-register"></i><span>Punto de Venta</span></a>
                <a href="inventario.html" class="nav-item"><i class="fas fa-boxes"></i><span>Inventario</span></a>
                <a href="clientes.html" class="nav-item"><i class="fas fa-users"></i><span>Clientes</span></a>
                <a href="reportes.html" class="nav-item active"><i class="fas fa-chart-line"></i><span>Reportes</span></a>
                <a href="ventas-dia.html" class="nav-item"><i class="fas fa-chart-simple"></i><span>IPV del Día</span></a>
                <a href="cierre-caja.html" class="nav-item"><i class="fas fa-calculator"></i><span>Cierre de Caja</span></a>
                <a href="reporte-iva.html" class="nav-item"><i class="fas fa-file-invoice-dollar"></i><span>Reporte IVA</span></a>
                <a href="configuracion.html" class="nav-item"><i class="fas fa-cog"></i><span>Configuración</span></a>
            </nav>
            <div class="sidebar-footer">
                <div class="theme-toggle" id="themeToggle"><span><i class="fas fa-moon"></i> Modo oscuro</span><span id="themeStatus">🌙</span></div>
                <div class="color-options"><div class="color-dot" data-color="default" style="background:#2563eb"></div><div class="color-dot" data-color="emerald" style="background:#10b981"></div><div class="color-dot" data-color="violet" style="background:#8b5cf6"></div><div class="color-dot" data-color="rose" style="background:#f43f5e"></div><div class="color-dot" data-color="amber" style="background:#f59e0b"></div></div>
            </div>
        </aside>
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <main class="main-content">
            <div class="mobile-header"><button class="mobile-menu-btn" id="mobileMenuBtn"><i class="fas fa-bars"></i></button><h2><i class="fas fa-chart-line"></i> Reportes</h2><div></div></div>

            <div class="terminal-card">
                <h2><i class="fas fa-calendar-alt"></i> Período</h2>
                <div style="display:flex; gap:12px; flex-wrap:wrap;">
                    <button class="periodo-btn active" data-periodo="dia">Hoy</button>
                    <button class="periodo-btn" data-periodo="semana">Semana</button>
                    <button class="periodo-btn" data-periodo="mes">Mes</button>
                    <button class="periodo-btn" data-periodo="anio">Año</button>
                    <div style="margin-left:auto;"><input type="date" id="fechaInicio"><input type="date" id="fechaFin"><button id="btnPersonalizado" class="btn-terminal">Aplicar</button></div>
                </div>
            </div>

            <div class="terminal-card">
                <h2><i class="fas fa-chart-pie"></i> Resumen</h2>
                <div id="resumenReportes" style="display:grid; grid-template-columns:repeat(4,1fr); gap:16px;"></div>
            </div>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
                <div class="terminal-card"><h2><i class="fas fa-chart-bar"></i> Método de pago más usado</h2><div id="graficoMetodosPago"></div><button id="exportMetodos" class="btn-terminal" style="margin-top:12px;">Exportar</button></div>
                <div class="terminal-card"><h2><i class="fas fa-chart-line"></i> Productos más vendidos</h2><div id="topVendidos"></div><button id="exportTop" class="btn-terminal" style="margin-top:12px;">Exportar</button></div>
            </div>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:20px;">
                <div class="terminal-card"><h2><i class="fas fa-arrow-up"></i> Mayor movimiento (stock)</h2><div id="mayorMovimiento"></div></div>
                <div class="terminal-card"><h2><i class="fas fa-arrow-down"></i> Menor movimiento (stock)</h2><div id="menorMovimiento"></div></div>
            </div>

            <div class="terminal-card">
                <h2><i class="fas fa-boxes"></i> Resumen de inventario</h2>
                <div id="resumenInventario" style="display:flex; justify-content:space-around; padding:16px;"></div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
    <script src="storage-manager.js"></script>
    <script>
        let ventas = [];
        let productos = [];

        function obtenerFechasPeriodo(periodo){
            const hoy = new Date();
            let inicio = new Date(), fin = new Date();
            if(periodo==='dia'){ inicio.setHours(0,0,0,0); fin.setHours(23,59,59,999); }
            else if(periodo==='semana'){ inicio.setDate(hoy.getDate()-hoy.getDay()); inicio.setHours(0,0,0,0); fin=new Date(); }
            else if(periodo==='mes'){ inicio=new Date(hoy.getFullYear(),hoy.getMonth(),1); fin=new Date(); }
            else if(periodo==='anio'){ inicio=new Date(hoy.getFullYear(),0,1); fin=new Date(); }
            return {inicio,fin};
        }

        async function cargarReportes(){
            ventas = await storage.getData('ventas');
            productos = await storage.getData('productos');
            const periodoActivo = document.querySelector('.periodo-btn.active')?.dataset.periodo;
            let inicio, fin;
            if(periodoActivo && periodoActivo!=='personalizado'){
                const fechas = obtenerFechasPeriodo(periodoActivo);
                inicio = fechas.inicio; fin = fechas.fin;
            } else {
                inicio = new Date(document.getElementById('fechaInicio').value);
                fin = new Date(document.getElementById('fechaFin').value);
                fin.setHours(23,59,59,999);
            }
            const ventasFiltradas = ventas.filter(v=>new Date(v.fecha)>=inicio && new Date(v.fecha)<=fin);
            const totalVentas = ventasFiltradas.reduce((s,v)=>s+v.total,0);
            const totalGanancia = ventasFiltradas.reduce((s,v)=>s+(v.ganancia||0),0);
            const totalProductosVendidos = ventasFiltradas.reduce((s,v)=>s+v.items.reduce((a,i)=>a+i.cantidad,0),0);
            const numVentas = ventasFiltradas.length;
            document.getElementById('resumenReportes').innerHTML = `
                <div class="stat-box"><i class="fas fa-dollar-sign"></i><h4>Total Ventas</h4><p>$${totalVentas.toFixed(2)}</p></div>
                <div class="stat-box"><i class="fas fa-chart-line"></i><h4>Ganancia</h4><p>$${totalGanancia.toFixed(2)}</p></div>
                <div class="stat-box"><i class="fas fa-box"></i><h4>Productos Vendidos</h4><p>${totalProductosVendidos}</p></div>
                <div class="stat-box"><i class="fas fa-receipt"></i><h4>N° Ventas</h4><p>${numVentas}</p></div>
            `;
            const metodos = {efectivo:0,tarjeta:0,transferencia:0,credito:0};
            const productosVendidos = {};
            ventasFiltradas.forEach(v=>{
                if(v.metodo==='combinado' && v.pagos){
                    if(v.pagos.efectivo) metodos.efectivo += v.pagos.efectivo;
                    if(v.pagos.tarjeta) metodos.tarjeta += v.pagos.tarjeta;
                    if(v.pagos.transferencia) metodos.transferencia += v.pagos.transferencia;
                    if(v.pagos.credito) metodos.credito += v.pagos.credito;
                } else if(metodos[v.metodo]!==undefined) metodos[v.metodo] += v.total;
                v.items.forEach(i=>{ if(!productosVendidos[i.nombre]) productosVendidos[i.nombre]=0; productosVendidos[i.nombre]+=i.cantidad; });
            });
            const metodosDiv = document.getElementById('graficoMetodosPago');
            const totalMetodos = Object.values(metodos).reduce((a,b)=>a+b,0);
            if(totalMetodos===0) metodosDiv.innerHTML='<p>No hay datos</p>';
            else metodosDiv.innerHTML = Object.entries(metodos).filter(([_,v])=>v>0).map(([m,v])=>`<div><div style="display:flex; justify-content:space-between;"><span>${m.toUpperCase()}</span><span>$${v.toFixed(2)} (${((v/totalMetodos)*100).toFixed(1)}%)</span></div><div class="progress-bar"><div class="progress-fill" style="width:${(v/totalMetodos)*100}%"></div></div></div>`).join('');
            const top = Object.entries(productosVendidos).sort((a,b)=>b[1]-a[1]).slice(0,5);
            const topDiv = document.getElementById('topVendidos');
            topDiv.innerHTML = top.map(([n,c],i)=>`<div style="display:flex; justify-content:space-between; padding:8px 0;"><span>${i+1}. ${n}</span><span>${c} uds</span></div>`).join('');
            const movimientos = productos.map(p=>{ const vendido = productosVendidos[p.nombre]||0; return {nombre:p.nombre, vendido, stock:p.stock}; }).sort((a,b)=>b.vendido-a.vendido);
            document.getElementById('mayorMovimiento').innerHTML = movimientos.slice(0,5).map(m=>`<div>${m.nombre}: ${m.vendido} vendidos / ${m.stock} stock</div>`).join('');
            document.getElementById('menorMovimiento').innerHTML = movimientos.filter(m=>m.vendido===0).slice(0,5).map(m=>`<div>${m.nombre}: sin ventas / ${m.stock} stock</div>`).join('');
            const totalProductos = productos.length;
            const valorInventario = productos.reduce((s,p)=>s+(p.precio*p.stock),0);
            document.getElementById('resumenInventario').innerHTML = `<div><i class="fas fa-boxes"></i> Total productos: ${totalProductos}</div><div><i class="fas fa-dollar-sign"></i> Valor inventario: $${valorInventario.toFixed(2)}</div>`;
        }

        document.querySelectorAll('.periodo-btn').forEach(btn=>btn.addEventListener('click',()=>{ document.querySelectorAll('.periodo-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); cargarReportes(); }));
        document.getElementById('btnPersonalizado').addEventListener('click',()=>{ document.querySelectorAll('.periodo-btn').forEach(b=>b.classList.remove('active')); cargarReportes(); });
        document.getElementById('exportMetodos').addEventListener('click',()=>{ alert('Funcionalidad de exportación - Puedes implementar export a PDF/Excel con librerías como SheetJS'); });
        document.getElementById('exportTop').addEventListener('click',()=>{ alert('Funcionalidad de exportación'); });
        cargarReportes();

        // Sidebar, tema, colores
        const sidebar=document.getElementById('sidebar'), overlay=document.getElementById('sidebarOverlay'), mobileBtn=document.getElementById('mobileMenuBtn');
        mobileBtn?.addEventListener('click',()=>{ sidebar.classList.toggle('open'); overlay.classList.toggle('open'); });
        overlay?.addEventListener('click',()=>{ sidebar.classList.remove('open'); overlay.classList.remove('open'); });
        const themeToggle=document.getElementById('themeToggle'), savedTheme=localStorage.getItem('theme')||'light';
        document.documentElement.setAttribute('data-theme',savedTheme);
        themeToggle.querySelector('#themeStatus').textContent=savedTheme==='dark'?'☀️':'🌙';
        themeToggle.addEventListener('click',()=>{ const curr=document.documentElement.getAttribute('data-theme'); const nue=curr==='dark'?'light':'dark'; document.documentElement.setAttribute('data-theme',nue); localStorage.setItem('theme',nue); themeToggle.querySelector('#themeStatus').textContent=nue==='dark'?'☀️':'🌙'; });
        const colorDots=document.querySelectorAll('.color-dot'), savedColor=localStorage.getItem('colorTheme')||'default';
        document.documentElement.setAttribute('data-color',savedColor);
        colorDots.forEach(dot=>{ dot.classList.toggle('active',dot.dataset.color===savedColor); dot.addEventListener('click',()=>{ const col=dot.dataset.color; document.documentElement.setAttribute('data-color',col); localStorage.setItem('colorTheme',col); colorDots.forEach(d=>d.classList.remove('active')); dot.classList.add('active'); }); });
    </script>
    <style>
        .progress-bar { background: var(--bg-tertiary); border-radius: 8px; height: 8px; overflow: hidden; margin: 4px 0; }
        .progress-fill { height: 100%; background: var(--primary); }
    </style>
</body>
</html>
